<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio Premium - Gold & Ruby</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Fundo base Apple Dark */
            --bg-base: #000000;
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #86868b;
            --font-family: 'Inter', -apple-system, sans-serif;
            
            /* TEMA CAFE (OURO) */
            --gold-main: #D4AF37; 
            --gradient-gold-btn: linear-gradient(135deg, #F9F1D8 0%, #D4AF37 50%, #AA771C 100%);
            --glow-gold: rgba(212, 175, 55, 0.4);
            
            /* TEMA RESTAURANTE (RUBY RED) */
            --red-main: #ff3b30; 
            --gradient-red-btn: linear-gradient(135deg, #ff5e62 0%, #e60000 50%, #8a0000 100%);
            --glow-red: rgba(255, 59, 48, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
        }

        /* NAVEGAÇÃO */
        .segmented-control {
            display: flex;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin: 15px auto 5px auto;
            padding: 4px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--glass-border);
            z-index: 10;
        }

        .segment-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .segment-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* CONTAINER PRINCIPAL */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px 15px 15px;
            overflow: hidden;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .view-section {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        .view-section.active {
            display: flex;
            animation: fadeInView 0.4s ease forwards;
        }

        /* RESULTADO GIGANTE (Foco Principal) */
        .result-panel {
            flex: 0 0 auto;
            min-height: 15vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            overflow: visible;
        }

        .result-text {
            /* Tamanho massivo adaptável */
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            letter-spacing: -2px;
            text-align: center;
            line-height: 1.1;
            transition: all 0.1s ease;
            white-space: nowrap;
        }

        #coffee-view .result-text { background: var(--gradient-gold-btn); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #food-view .result-text { background: var(--gradient-red-btn); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* BOTÃO COMPACTO (Mas largo e visível) */
        .btn-wrapper {
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .action-btn {
            width: 100%;
            padding: 18px 0;
            border: none;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #000;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
        }

        /* Temas e Animação de Brilho no Botão */
        #coffee-view .action-btn { 
            background: var(--gradient-gold-btn); 
            box-shadow: 0 8px 25px var(--glow-gold);
            animation: pulseGlowGold 3s infinite alternate;
        }
        #food-view .action-btn { 
            background: var(--gradient-red-btn); 
            color: #fff;
            box-shadow: 0 8px 25px var(--glow-red);
            animation: pulseGlowRed 3s infinite alternate;
        }

        .action-btn:hover { transform: scale(0.98); filter: brightness(1.15); }
        .action-btn:active { transform: scale(0.95); }

        /* LISTA ULTRA COMPACTA (Glass Card) */
        .glass-card {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 15px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .apple-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        .apple-add-btn {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-weight: 700;
            cursor: pointer;
        }

        /* SCROLL E GRID DE ALTA DENSIDADE */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .list-grid {
            display: grid;
            /* 140px garante no mínimo 2 colunas até nos menores iPhones */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }

        /* ITEM DA LISTA (Pill menor) */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.02);
            animation: slideUp 0.3s ease forwards;
        }

        .item-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 8px;
        }

        /* TOGGLE SWITCH (Versão Mini) */
        .ios-toggle {
            position: relative;
            width: 38px;
            height: 22px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .ios-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #coffee-view .ios-toggle.active { background: var(--gold-main); }
        #food-view .ios-toggle.active { background: var(--red-main); }
        .ios-toggle.active::after { transform: translateX(16px); }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
        }

        /* ANIMAÇÕES PREMIUM */
        @keyframes fadeInView { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes pulseGlowGold { 0% { box-shadow: 0 8px 25px rgba(212,175,55,0.2); } 100% { box-shadow: 0 8px 40px rgba(212,175,55,0.6); } }
        @keyframes pulseGlowRed { 0% { box-shadow: 0 8px 25px rgba(255,59,48,0.2); } 100% { box-shadow: 0 8px 40px rgba(255,59,48,0.6); } }
        
        /* Efeito Roleta (Desfoque de Movimento) */
        .spinning-text {
            filter: blur(2px);
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* Explosão do Vencedor */
        @keyframes winnerPop {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1); filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }
        .winner-anim {
            animation: winnerPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); }
        }
        .shake-anim { animation: shake 0.3s ease; }

    </style>
</head>
<body>

    <nav class="segmented-control">
        <button class="segment-btn active" data-tab="coffee">☕ Café Gold</button>
        <button class="segment-btn" data-tab="food">🎲 Restaurantes Red</button>
    </nav>

    <main class="main-content">

        <section id="coffee-view" class="view-section active">
            <div class="result-panel">
                <div class="result-text" id="coffee-result">?</div>
            </div>
            
            <div class="btn-wrapper">
                <button class="action-btn" onclick="drawWinner('coffee')">Sortear Café</button>
            </div>

            <div class="glass-card">
                <div class="input-group">
                    <input type="text" id="coffee-input" class="apple-input" placeholder="Novo nome...">
                    <button class="apple-add-btn" onclick="addItem('coffee')">+</button>
                </div>
                <div class="list-container">
                    <div class="list-grid" id="coffee-grid"></div>
                </div>
            </div>
        </section>

        <section id="food-view" class="view-section">
            <div class="result-panel">
                <div class="result-text" id="food-result">?</div>
            </div>

            <div class="btn-wrapper">
                <button class="action-btn" onclick="drawWinner('food')">Girar Roleta</button>
            </div>

            <div class="glass-card">
                <div class="input-group">
                    <input type="text" id="food-input" class="apple-input" placeholder="Novo local...">
                    <button class="apple-add-btn" onclick="addItem('food')">+</button>
                </div>
                <div class="list-container">
                    <div class="list-grid" id="food-grid"></div>
                </div>
            </div>
        </section>

    </main>

    <script>
        const defaultCoffee = ["Juan", "Anthony", "Deivid", "Felipe", "Josi", "Matheus", "Arthur", "Mari", "Karina", "lari", "Giulia", "Enzo", "Matt"];
        const defaultFood = ["Mosca", "Dudas", "Dudas Ber.", "Japa", "Savanna", "Guara", "Amora", "Espeto", "Baoba I", "Baoba II", "Hotel", "Baraka", "Arabe"];

        let appState = {
            coffee: JSON.parse(localStorage.getItem('v3_coffee')) || initArray(defaultCoffee),
            food: JSON.parse(localStorage.getItem('v3_food')) || initArray(defaultFood)
        };

        let isRolling = false;

        function initArray(arr) { return arr.map(name => ({ name, enabled: true, custom: false })); }
        function saveState(type) { localStorage.setItem(`v3_${type}`, JSON.stringify(appState[type])); }

        document.querySelectorAll('.segment-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isRolling) return;
                document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${btn.dataset.tab}-view`).classList.add('active');
            });
        });

        function renderGrid(type) {
            const grid = document.getElementById(`${type}-grid`);
            grid.innerHTML = '';
            appState[type].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.style.animationDelay = `${index * 0.02}s`; // Animação em cascata

                const nameSpan = document.createElement('span');
                nameSpan.className = 'item-name';
                nameSpan.textContent = item.name;

                const controls = document.createElement('div');
                controls.style.display = 'flex';
                controls.style.gap = '8px';
                controls.style.alignItems = 'center';

                const toggle = document.createElement('div');
                toggle.className = `ios-toggle ${item.enabled ? 'active' : ''}`;
                toggle.onclick = () => {
                    item.enabled = !item.enabled;
                    toggle.classList.toggle('active');
                    saveState(type);
                };
                controls.appendChild(toggle);

                if (item.custom) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerHTML = '✕';
                    delBtn.onclick = () => { appState[type].splice(index, 1); saveState(type); renderGrid(type); };
                    controls.appendChild(delBtn);
                }

                div.appendChild(nameSpan);
                div.appendChild(controls);
                grid.appendChild(div);
            });
        }

        function addItem(type) {
            const input = document.getElementById(`${type}-input`);
            const val = input.value.trim();
            if (!val) return;
            if (!appState[type].some(i => i.name.toLowerCase() === val.toLowerCase())) {
                appState[type].unshift({ name: val, enabled: true, custom: true });
                saveState(type);
                renderGrid(type);
            }
            input.value = '';
        }

        function drawWinner(type) {
            if (isRolling) return;
            const pool = appState[type].filter(item => item.enabled).map(item => item.name);
            const display = document.getElementById(`${type}-result`);
            
            if (pool.length === 0) {
                display.textContent = "Vazio!";
                display.classList.add('shake-anim');
                setTimeout(() => display.classList.remove('shake-anim'), 300);
                return;
            }

            isRolling = true;
            display.classList.remove('winner-anim');
            display.classList.add('spinning-text'); // Aplica o desfoque de movimento
            
            let counter = 0;
            let speed = 30; // Mais rápido
            const maxSpins = 40; // Roda mais vezes para criar suspense

            function spin() {
                display.textContent = pool[Math.floor(Math.random() * pool.length)];
                counter++;

                if (counter < maxSpins) {
                    if (counter > 25) speed += 20;
                    if (counter > 35) speed += 60;
                    setTimeout(spin, speed);
                } else {
                    display.classList.remove('spinning-text');
                    display.textContent = pool[Math.floor(Math.random() * pool.length)];
                    display.classList.add('winner-anim'); // Explosão da animação final
                    isRolling = false;
                }
            }
            spin();
        }

        renderGrid('coffee');
        renderGrid('food');

        document.getElementById('coffee-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') addItem('coffee'); });
        document.getElementById('food-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') addItem('food'); });

    </script>
</body>
</html>
</html>
